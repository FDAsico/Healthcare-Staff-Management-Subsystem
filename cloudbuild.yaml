steps:
  # Install dependencies
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['ci']

  # Generate Prisma client
  - name: 'node:20-alpine'
    entrypoint: 'npx'
    args: ['prisma', 'generate']

  # Build TypeScript
  - name: 'node:20-alpine'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/healthcare-staff-management-api:$COMMIT_SHA'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/healthcare-staff-management-api:latest'
      - '.'

  # Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/healthcare-staff-management-api'

  # Deploy the pre-built image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'healthcare-staff-management-api'
      - '--image'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/healthcare-staff-management-api:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '5'
      - '--min-instances'
      - '0'
      - '--set-secrets'
      - 'DATABASE_URL=database-url:latest,JWT_SECRET=jwt-secret:latest,SUBSYSTEM_API_KEY=subsystem_api_key:latest'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--service-account'
      - 'healthcare-staff-api-sa@$PROJECT_ID.iam.gserviceaccount.com'
# FRONTEND_URL=frontend-url:latest // Add this later for deployment of Frontend
images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/healthcare-staff-management-api:$COMMIT_SHA'
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/healthcare-staff-management-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY